<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Race Master Tactical</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: #000000;
            color: #FFFF00; /* High-visibility yellow */
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Permission Overlay Overlay Screen */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #start-btn {
            background: #FFFF00;
            color: #000000;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }

        /* Top Section: Massive Compass Header */
        .compass-header {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 4px solid #FFFF00;
            position: relative;
        }
        .compass-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: absolute;
            top: 5px;
        }
        #compass {
            font-size: 110px;
            font-weight: 900;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        /* Middle Section: Tactical Visual Tape Indicator */
        .tape-container {
            flex: 0.6;
            border-bottom: 4px solid #FFFF00;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .center-lubber {
            position: absolute;
            width: 4px;
            height: 100%;
            background-color: #FF3B30; /* Red alignment line */
            z-index: 10;
        }
        #tape-scale {
            display: flex;
            position: absolute;
            white-space: nowrap;
            font-size: 24px;
            font-weight: bold;
        }
        .tape-mark {
            width: 60px;
            text-align: center;
            display: inline-block;
        }

        /* Bottom Section: Grid Data Fields */
        .grid-container {
            flex: 1.5;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 4px;
            padding-top: 4px;
        }
        .data-box {
            background: #111111;
            border: 2px solid #333333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .data-label {
            font-size: 14px;
            color: #8E8E93;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .data-value {
            font-size: 40px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn" onclick="initSensors()">START INSTRUMENTS</button>
    </div>

    <div class="compass-header">
        <div class="compass-title">Heading</div>
        <div id="compass">000°</div>
    </div>

    <div class="tape-container">
        <div class="center-lubber"></div>
        <div id="tape-scale"></div>
    </div>

    <div class="grid-container">
        <div class="data-box">
            <div class="data-label">COG</div>
            <div class="data-value" id="cog">---°</div>
        </div>
        <div class="data-box">
            <div class="data-label">SOG (KTS)</div>
            <div class="data-value" id="sog">0.0</div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const compassDisplay = document.getElementById('compass');
        const tapeScale = document.getElementById('tape-scale');
        const cogDisplay = document.getElementById('cog');
        const sogDisplay = document.getElementById('sog');

        // Low-pass filter smoothing variables
        let smoothedHeading = 0;
        const filterFactor = 0.2; // Lower = smoother but slower; Higher = faster updates.

        // Generate full circular compass scale matrix
        function initCompassTape() {
            let html = '';
            for (let i = -180; i <= 540; i += 10) {
                let heading = (i + 360) % 360;
                let display = heading === 0 ? 'N' : heading === 90 ? 'E' : heading === 180 ? 'S' : heading === 270 ? 'W' : heading;
                html += `<div class="tape-mark">${display}</div>`;
            }
            tapeScale.innerHTML = html;
        }
        initCompassTape();

        // Triggered via user click to pass security restrictions
        function initSensors() {
            document.getElementById('overlay').style.display = 'none';

            // Check and prompt for Device Orientation API (iOS 13+ handles explicit requests, iOS 10 defaults straight to execution)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            // Fire GPS tracking engine
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(handleGPS, handleGPSError, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                });
            } else {
                alert("GPS functionality missing from host system.");
            }
        }

        function handleOrientation(event) {
            let currentHeading = event.webkitCompassHeading;
            if (currentHeading !== undefined && currentHeading !== null) {
                
                // Math fix to prevent jitter when crossing North (359° to 0°)
                if (Math.abs(currentHeading - smoothedHeading) > 180) {
                    if (currentHeading > smoothedHeading) smoothedHeading += 360;
                    else smoothedHeading -= 360;
                }

                // Apply exponential moving average calculation
                smoothedHeading = smoothedHeading + filterFactor * (currentHeading - smoothedHeading);
                let finalHeading = (Math.round(smoothedHeading) + 360) % 360;

                // Update Display Text
                compassDisplay.innerText = String(finalHeading).padStart(3, '0') + '°';

                // Shift graphical scale track layout
                let tapeOffset = -(finalHeading * 6) - 1080; 
                tapeScale.style.transform = `translateX(${tapeOffset}px)`;
            }
        }

        function handleGPS(position) {
            let coords = position.coords;

            // Compute Speed Over Ground (Meters per Second -> Knots)
            if (coords.speed !== null && coords.speed >= 0) {
                let knots = (coords.speed * 1.94384).toFixed(1);
                sogDisplay.innerText = knots;
            } else {
                sogDisplay.innerText = "0.0";
            }

            // Compute Course Over Ground (Direct movement vector)
            if (coords.heading !== null && coords.heading >= 0) {
                let cog = Math.round(coords.heading);
                cogDisplay.innerText = String(cog).padStart(3, '0') + '°';
            } else {
                cogDisplay.innerText = "---°";
            }
        }

        function handleGPSError(error) {
            console.warn(`Satellite Exception (${error.code}): ${error.message}`);
        }
    </script>
</body>
</html>

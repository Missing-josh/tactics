<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Race Master Pro</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: #000000;
            color: #FFFF00; /* High-visibility yellow */
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* System Lock Screen Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #start-btn {
            background: #FFFF00;
            color: #000000;
            border: none;
            padding: 25px 50px;
            font-size: 26px;
            font-weight: bold;
            border-radius: 12px;
        }

        /* SCREEN 1: FULL SCREEN TIMER MODE */
        #timer-screen {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            width: 100vw;
            padding: 20px;
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
            background: #000000;
        }
        .timer-title {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #8E8E93;
            margin-top: 20px;
        }
        #timer-display {
            font-size: 130px; /* Massive display */
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .timer-controls {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }
        .timer-btn {
            flex: 1;
            background: #111111;
            color: #FFFF00;
            border: 3px solid #FFFF00;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
        }
        .timer-btn:active {
            background: #FFFF00;
            color: #000000;
        }

        /* SCREEN 2: FULL SCREEN TACTICAL MODE (Hidden initially) */
        #tactical-screen {
            display: none; /* Controlled via JS state */
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: 10px;
            position: absolute;
            top: 0; left: 0;
            z-index: 5;
            background: #000000;
        }
        .compass-header {
            flex: 1.8;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 4px solid #FFFF00;
        }
        #compass {
            font-size: 120px;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }
        .tape-container {
            flex: 0.6;
            border-bottom: 4px solid #FFFF00;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .center-lubber {
            position: absolute;
            width: 4px;
            height: 100%;
            background-color: #FF3B30;
            z-index: 10;
        }
        #tape-scale {
            display: flex;
            position: absolute;
            white-space: nowrap;
            font-size: 24px;
            font-weight: bold;
        }
        .tape-mark {
            width: 60px;
            text-align: center;
            display: inline-block;
        }
        .grid-container {
            flex: 1.5;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding-top: 6px;
        }
        .data-box {
            background: #111111;
            border: 2px solid #333333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .data-label {
            font-size: 14px;
            color: #8E8E93;
            font-weight: bold;
            text-transform: uppercase;
        }
        .data-value {
            font-size: 46px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn" onclick="initSensors()">START INSTRUMENTS</button>
    </div>

    <div id="timer-screen">
        <div class="timer-title">Start Sequence</div>
        <div id="timer-display">05:00</div>
        <div class="timer-controls">
            <button class="timer-btn" onclick="adjustTimer(60)">+1M</button>
            <button class="timer-btn" onclick="adjustTimer(-60)">-1M</button>
            <button class="timer-btn" id="run-btn" onclick="toggleTimer()" style="background: #FFFF00; color: #000000;">START</button>
            <button class="timer-btn" onclick="syncTimer()">SYNC</button>
        </div>
    </div>

    <div id="tactical-screen">
        <div class="compass-header">
            <div id="compass">000°</div>
        </div>
        <div class="tape-container">
            <div class="center-lubber"></div>
            <div id="tape-scale"></div>
        </div>
        <div class="grid-container">
            <div class="data-box">
                <div class="data-label">COG</div>
                <div class="data-value" id="cog">---°</div>
            </div>
            <div class="data-box">
                <div class="data-label">SOG (KTS)</div>
                <div class="data-value" id="sog">0.0</div>
            </div>
        </div>
    </div>

    <script>
        // DOM targets
        const timerScreen = document.getElementById('timer-screen');
        const tacticalScreen = document.getElementById('tactical-screen');
        const compassDisplay = document.getElementById('compass');
        const tapeScale = document.getElementById('tape-scale');
        const cogDisplay = document.getElementById('cog');
        const sogDisplay = document.getElementById('sog');
        const timerDisplay = document.getElementById('timer-display');
        const runBtn = document.getElementById('run-btn');

        // Math/Logic state machines
        let smoothedHeading = 0;
        const filterFactor = 0.25; 
        let timerSeconds = 300; 
        let timerInterval = null;
        let audioCtx = null;

        function initCompassTape() {
            let html = '';
            for (let i = -180; i <= 540; i += 10) {
                let heading = (i + 360) % 360;
                let display = heading === 0 ? 'N' : heading === 90 ? 'E' : heading === 180 ? 'S' : heading === 270 ? 'W' : heading;
                html += `<div class="tape-mark">${display}</div>`;
            }
            tapeScale.innerHTML = html;
        }
        initCompassTape();

        function initSensors() {
            document.getElementById('overlay').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(handleGPS, null, { enableHighAccuracy: true, maximumAge: 0 });
            }
        }

        function handleOrientation(event) {
            let currentHeading = event.webkitCompassHeading;
            if (currentHeading !== undefined && currentHeading !== null) {
                if (Math.abs(currentHeading - smoothedHeading) > 180) {
                    if (currentHeading > smoothedHeading) smoothedHeading += 360;
                    else smoothedHeading -= 360;
                }
                smoothedHeading = smoothedHeading + filterFactor * (currentHeading - smoothedHeading);
                let finalHeading = (Math.round(smoothedHeading) + 360) % 360;
                compassDisplay.innerText = String(finalHeading).padStart(3, '0') + '°';
                let tapeOffset = -(finalHeading * 6) - 1080; 
                tapeScale.style.transform = `translateX(${tapeOffset}px)`;
            }
        }

        function handleGPS(position) {
            let coords = position.coords;
            if (coords.speed !== null && coords.speed >= 0) {
                sogDisplay.innerText = (coords.speed * 1.94384).toFixed(1);
            }
            if (coords.heading !== null && coords.heading >= 0) {
                cogDisplay.innerText = String(Math.round(coords.heading)).padStart(3, '0') + '°';
            }
        }

        function fireHorn(duration) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            osc.type = 'sawtooth'; 
            osc.frequency.setValueAtTime(220, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                let utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.1; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function updateTimerUI() {
            let minutes = Math.floor(timerSeconds / 60);
            let seconds = timerSeconds % 60;
            timerDisplay.innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function adjustTimer(amount) {
            timerSeconds = Math.max(0, timerSeconds + amount);
            updateTimerUI();
        }

        function syncTimer() {
            if (timerInterval && timerSeconds > 0) {
                timerSeconds = Math.floor(timerSeconds / 60) * 60;
                updateTimerUI();
                speakText("Synchronized");
            }
        }

        function toggleTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                runBtn.innerText = "START";
                runBtn.style.background = "#FFFF00";
            } else {
                runBtn.innerText = "STOP";
                runBtn.style.background = "#FF3B30";
                timerInterval = setInterval(runTick, 1000);
            }
        }

        function switchToTacticalMode() {
            // Kill countdown processing loops
            clearInterval(timerInterval);
            timerInterval = null;
            
            // Clean interface swap
            timerScreen.style.display = 'none';
            tacticalScreen.style.display = 'flex';
        }

        function runTick() {
            timerSeconds--;
            updateTimerUI();

            if (timerSeconds > 0) {
                if (timerSeconds % 60 === 0) {
                    fireHorn(1.2);
                    speakText(`${timerSeconds / 60} minutes`);
                } else if (timerSeconds === 30) {
                    fireHorn(0.8);
                    speakText("Thirty seconds");
                } else if (timerSeconds === 45 || timerSeconds === 15) {
                    speakText(`${timerSeconds} seconds`);
                } else if (timerSeconds <= 10) {
                    fireHorn(0.2);
                    speakText(`${timerSeconds}`);
                }
            } else if (timerSeconds === 0) {
                // START SIGNAL MATCHED
                fireHorn(2.5);
                speakText("Start");
                
                // Switch interface immediately
                switchToTacticalMode();
            }
        }
    </script>
</body>
</html>
